<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Cyber Bots Adventure</title>
  <meta name="theme-color" content="#0a1024">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Cyber Bots Adventure">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon-192.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icons/icon-192.svg">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="app">
    <section id="homeScreen" class="screen active">
      <div class="backdrop">
        <div class="glow glow-a"></div>
        <div class="glow glow-b"></div>
        <div class="grid"></div>
      </div>
      <div class="top-bar">
        <button id="installButton" class="tiny-icon hidden-install" aria-label="Instalar">+</button>
        <button id="soundToggle" class="tiny-icon" aria-label="Audio">🔊</button>
      </div>
      <div class="hero-panel">
        <div class="title-block">
          <p class="eyebrow">Aventura 2D</p>
          <h1>Cyber Bots Adventure</h1>
          <p class="subtitle">Muévete, salta y transfórmate para superar obstáculos claros y fáciles de entender.</p>
        </div>
        <div id="homeHeroCard" class="home-hero-card hero-orion">
          <div class="robot-swatch">
            <div class="robot-head"></div>
            <div class="robot-body"></div>
          </div>
          <div class="vehicle-swatch"></div>
        </div>
        <div class="home-actions">
          <button id="playButton" class="primary-cta">Jugar</button>
          <button id="openRosterButton" class="secondary-cta">Elegir bot</button>
        </div>
      </div>
    </section>

    <section id="rosterScreen" class="screen">
      <div class="panel shell">
        <div class="panel-header">
          <button id="rosterBackButton" class="tiny-icon back-button" aria-label="Volver">←</button>
          <div>
            <p class="eyebrow">Selecciona personaje</p>
            <h2>Elige tu Cyber Bot</h2>
          </div>
        </div>
        <div id="characterCarousel" class="character-carousel"></div>
        <div class="home-actions compact-actions">
          <button id="selectCharacterButton" class="primary-cta small-cta">Confirmar</button>
        </div>
      </div>
    </section>

    <section id="gameScreen" class="screen">
      <div class="hud top-left">
        <div class="hud-pill"><span>⚡</span><span id="energyCount">0</span></div>
        <div class="hud-pill"><span>★</span><span id="starCount">0</span></div>
        <div class="hud-pill"><span>🤖</span><span id="botCount">0</span></div>
      </div>
      <div class="hud top-right single">
        <div id="formIndicator" class="hud-pill accent">Modo Robot</div>
      </div>
      <div id="voiceBubble" class="voice-bubble"></div>
      <div id="goalLabel" class="goal-label"></div>
      <canvas id="gameCanvas" width="1280" height="720" aria-label="Juego 2D de plataformas"></canvas>
      <div class="controls movement-controls">
        <button id="leftButton" class="control-button move" aria-label="Izquierda">◀</button>
        <button id="rightButton" class="control-button move" aria-label="Derecha">▶</button>
      </div>
      <div class="controls action-controls">
        <button id="jumpButton" class="control-button jump" aria-label="Saltar">Saltar</button>
        <button id="transformButton" class="control-button transform" aria-label="Transformarse">Transformar</button>
      </div>
    </section>

    <section id="rewardScreen" class="screen">
      <div class="panel reward-panel">
        <p class="eyebrow">Nivel completado</p>
        <h2>Lo lograste</h2>
        <div id="rewardHero" class="reward-hero hero-orion">
          <div class="robot-swatch">
            <div class="robot-head"></div>
            <div class="robot-body"></div>
          </div>
          <div class="vehicle-swatch"></div>
        </div>
        <div id="rewardLoot" class="reward-loot"></div>
        <div class="home-actions compact-actions">
          <button id="playAgainButton" class="primary-cta small-cta">Jugar otra vez</button>
          <button id="homeButton" class="secondary-cta small-cta">Inicio</button>
        </div>
      </div>
    </section>
  </div>

  <script src="./app.js"></script>
</body>
</html>
