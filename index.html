<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <title>Cyber Bots</title>
  <meta name="theme-color" content="#08101f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Cyber Bots">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon-192.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icons/icon-192.svg">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="app">
    <section id="homeScreen" class="screen active">
      <div class="world-bg"></div>
      <header class="top-actions">
        <button id="installButton" class="mini-btn hidden-install" aria-label="Instalar">+</button>
        <button id="soundToggle" class="mini-btn" aria-label="Audio">🔊</button>
      </header>

      <main class="home-layout">
        <section class="hero-zone" aria-label="Personaje seleccionado">
          <div class="hero-ring"></div>
          <div class="hero-light"></div>
          <img id="heroPreview" class="hero-preview" alt="">
          <div class="hero-nameplate">
            <strong id="heroName">Orion Pax</strong>
            <span id="heroRole">Equilibrado</span>
            <small id="heroDesc">Facil para empezar.</small>
          </div>
        </section>

        <section class="roster-zone" aria-label="Elegir personaje">
          <div id="characterCarousel" class="character-carousel"></div>
          <span id="selectedTag" class="sr-only">Equilibrado</span>
          <span id="abilityPrimary" class="sr-only">Escudo corto</span>
          <span id="abilitySecondary" class="sr-only">Recuperacion segura</span>
          <span id="statControl" class="sr-only">8</span>
          <span id="statJump" class="sr-only">8</span>
          <span id="statSpeed" class="sr-only">7</span>
          <span id="statPower" class="sr-only">8</span>
        </section>
      </main>

      <footer class="home-dock">
        <button id="playButton" class="play-btn" aria-label="Jugar">
          <span aria-hidden="true">▶</span>
        </button>
        <button id="toggleFormPreviewButton" class="form-btn" aria-label="Ver transformacion">
          <span aria-hidden="true">↔</span>
        </button>
      </footer>
    </section>

    <section id="gameScreen" class="screen">
      <canvas id="gameCanvas" width="1280" height="720"></canvas>

      <div class="hud">
        <div class="progress-meter" aria-label="Progreso"><div id="progressFill" class="progress-fill"></div></div>
        <div class="hud-chip">⚡ <span id="energyCount">0</span></div>
        <div class="hud-chip">★ <span id="starCount">0</span></div>
        <div class="hud-chip">🤖 <span id="botCount">0</span></div>
      </div>

      <div id="voiceBubble" class="voice-bubble" aria-live="polite">Vamos</div>
      <button id="pauseToHomeButton" class="mini-btn pause-btn" aria-label="Inicio">⌂</button>

      <div class="kid-controls">
        <button id="jumpButton" class="kid-btn jump" aria-label="Saltar">
          <span aria-hidden="true">↑</span>
        </button>
        <button id="transformButton" class="kid-btn transform" aria-label="Transformar">
          <span aria-hidden="true">⬢</span>
        </button>
      </div>
    </section>

    <section id="rewardScreen" class="screen">
      <div class="world-bg"></div>
      <main class="reward-card">
        <div class="reward-stars" aria-hidden="true">
          <span>★</span>
          <span>★</span>
          <span>★</span>
        </div>
        <div class="reward-stage">
          <img id="rewardRobot" class="reward-sprite" alt="">
          <div class="rescued-bot" aria-hidden="true">◉ ◉</div>
        </div>
        <div id="rewardLoot" class="reward-loot"></div>
        <div class="reward-actions">
          <button id="playAgainButton" class="play-btn small" aria-label="Jugar otra vez">↻</button>
          <button id="homeButton" class="form-btn small" aria-label="Inicio">⌂</button>
        </div>
      </main>
    </section>
  </div>

  <script src="./game-data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
