<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Original transformable robot character lineup inspired by youthful Cybertron science fiction">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07101f"/>
      <stop offset=".48" stop-color="#152b58"/>
      <stop offset="1" stop-color="#0a0d1c"/>
    </linearGradient>
    <linearGradient id="orionBody" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ff6b4a"/>
      <stop offset=".44" stop-color="#d33f3a"/>
      <stop offset=".45" stop-color="#3fb7ff"/>
      <stop offset="1" stop-color="#275dff"/>
    </linearGradient>
    <linearGradient id="beeBody" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ffe36b"/>
      <stop offset=".5" stop-color="#f3b21d"/>
      <stop offset=".51" stop-color="#273145"/>
      <stop offset="1" stop-color="#121826"/>
    </linearGradient>
    <linearGradient id="aerialBody" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ff91c9"/>
      <stop offset=".46" stop-color="#d94fa4"/>
      <stop offset=".47" stop-color="#8371ff"/>
      <stop offset="1" stop-color="#4336d4"/>
    </linearGradient>
    <linearGradient id="d16Body" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#d9dfec"/>
      <stop offset=".45" stop-color="#8a94a8"/>
      <stop offset=".46" stop-color="#555f72"/>
      <stop offset="1" stop-color="#252d3c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .card { fill: rgba(255,255,255,.055); stroke: rgba(255,255,255,.18); stroke-width: 2; }
      .rim { fill: none; stroke: rgba(68,239,255,.26); stroke-width: 5; }
      .visor { fill: #dcfbff; filter: url(#glow); }
      .metal { fill: rgba(255,255,255,.22); }
      .joint { fill: #0b1020; stroke: rgba(255,255,255,.2); stroke-width: 4; }
      .line { stroke: rgba(220,251,255,.7); stroke-width: 5; stroke-linecap: round; }
      .name { fill: #eff7ff; font: 800 34px Trebuchet MS, Arial, sans-serif; }
      .role { fill: #9ee3ff; font: 700 20px Trebuchet MS, Arial, sans-serif; }
      .note { fill: rgba(239,247,255,.72); font: 600 18px Trebuchet MS, Arial, sans-serif; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <path d="M0 760C260 690 410 810 650 720C870 640 1060 700 1260 626C1430 562 1510 596 1600 552V900H0Z" fill="rgba(68,239,255,.08)"/>
